<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduación Isaac Gregory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="portada-overlay" class="portada-overlay">
    <div class="portada-contenido">
      <p class="portada-sub">INVITACIÓN EXCLUSIVA</p>
      <h1 class="portada-titulo">ISAAC GREGORY</h1>
      <p class="portada-evento">Graduación de Primaria</p>
      <hr class="portada-separador">
      <button id="btn-ingresar" class="btn-primario">ABRIR INVITACIÓN</button>
    </div>
  </div>

  <main id="main-content" class="hidden">
    
    <div class="music-bar" id="music-bar">
      <button class="music-btn" id="music-btn" aria-label="Reproducir música">
        <span class="music-icon">▶</span>
      </button>
      <audio id="audio-player" loop></audio>
    </div>

    <section class="hero" id="hero">
      <div class="hero-content">
        <p class="hero-subtitulo" id="hero-subtitulo"></p>
        <h1 class="hero-nombre" id="hero-nombre"></h1>
        <p class="hero-gen" id="hero-generacion"></p>
      </div>
    </section>

    <section class="seccion-contenedor">
      <div class="caja-info">
        <p class="mensaje-personal" id="mensaje-personal"></p>
        <div class="linea-decorativa"></div>
        <p class="familia-texto" id="familia-texto"></p>
      </div>
    </section>

    <section class="seccion-contenedor">
      <h2 class="seccion-titulo">Ubicaciones y Horarios</h2>
      
      <div class="grid-eventos">
        <div class="caja-info tarjeta-evento">
          <div class="icono-evento">⛪</div>
          <h3>Ceremonia Religiosa</h3>
          <h4 id="ceremonia-nombre"></h4>
          <p class="evento-dato" id="ceremonia-fecha"></p>
          <p class="evento-dato" id="ceremonia-hora"></p>
          <p class="evento-dir" id="ceremonia-direccion"></p>
          <div class="mapa-container" id="ceremonia-mapa"></div>
          <a id="btn-ceremonia" target="_blank" class="btn-secundario">Ver en Google Maps</a>
        </div>

        <div class="caja-info tarjeta-evento">
          <div class="icono-evento">🍽️</div>
          <h3>Celebración</h3>
          <h4 id="restaurante-nombre"></h4>
          <p class="evento-nota" id="restaurante-nota"></p>
          <p class="evento-dir" id="restaurante-direccion"></p>
          <div class="imagen-restaurante-container">
            <img id="restaurante-img" src="" alt="Lugar de celebración" class="restaurante-foto">
          </div>
          <a id="btn-restaurante" target="_blank" class="btn-secundario">Ver Ubicación</a>
        </div>
      </div>
    </section>

    <section class="seccion-contenedor text-center">
      <div class="caja-info">
        <h2 class="dresscode-titulo">Código de Vestimenta</h2>
        <div class="dresscode-linea"></div>
        <p class="dresscode-texto" id="dresscode-texto"></p>
      </div>
    </section>

    <section class="seccion-contenedor">
      <h2 class="seccion-titulo">Nuestra Trayectoria</h2>
      <div class="galeria-slider-container">
        <button class="slider-nav prev" id="slide-prev">❮</button>
        <div class="galeria-track" id="galeria-track"></div>
        <button class="slider-nav next" id="slide-next">❯</button>
      </div>
    </section>

    <footer>
      <p>Te esperamos para celebrar juntos este gran logro.</p>
      <p style="margin-top: 10px; color: var(--dorado); letter-spacing: 2px; font-size: 11px;">KOMOREBI INVITACIONES DIGITALES</p>
    </footer>

  </main>

  <script src="event.js"></script>
  <script src="script.js"></script>
</body>
</html>
